<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <main>
      <h1>Contact Us</h1>
      <p>Have a question or feedback? Fill out the form below and we'll get back to you.</p>

      <form id="contact-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" aria-required="true" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" aria-required="true" />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject" aria-required="true">
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="billing">Billing Question</option>
            <option value="feedback">Feedback</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" aria-required="true"></textarea>
        </div>

        <!-- fieldset + legend group the checkbox as its own unit,
             so screen readers announce "Stay in touch" before the checkbox -->
        <fieldset class="checkbox-group">
          <legend>Stay in touch</legend>
          <div class="checkbox-row">
            <input type="checkbox" id="newsletter" name="newsletter" />
            <label for="newsletter">Sign me up for the newsletter</label>
          </div>
        </fieldset>

        <button type="submit">Send Message</button>
      </form>

      <div id="success-message" class="success-message" role="status">
        Thanks! Your message has been sent successfully.
      </div>
    </main>

    <script src="form.js"></script>
  </body>
</html>
